<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clock Fingers</title>
  <style>
    body { font-family: sans-serif; text-align: center; background: #222; color: #fff; }
    #clock { font-size: 4em; margin-top: 2em; }
    #fingers { margin-top: 2em; font-size: 6em; transition: opacity 0.5s; }
    .hidden { opacity: 0; }
  </style>
</head>
<body>
  <canvas id="analogClock" width="400" height="400" style="background:#000; border-radius:50%; margin-top:2em;"></canvas>
  <br>
  <button id="fullscreenBtn" style="margin-top:1em; font-size:1.2em;">Fullscreen</button>
  <button id="resetBtn" style="margin-top:1em; font-size:1.2em;">Reset Minutes</button>
  <br>
  <label for="intervalInput" style="margin-top:1em; font-size:1.1em; color:#fff;">Interval (seconds): </label>
  <input type="number" id="intervalInput" min="1" max="3600" value="60" style="font-size:1.2em; width:5em;">
  <script src="clock.js"></script>
  <script>
    document.getElementById('fullscreenBtn').onclick = function() {
      const canvas = document.getElementById('analogClock');
      if (canvas.requestFullscreen) {
        canvas.requestFullscreen();
      } else if (canvas.webkitRequestFullscreen) {
        canvas.webkitRequestFullscreen();
      } else if (canvas.msRequestFullscreen) {
        canvas.msRequestFullscreen();
      }
    };
    // Remove fullscreen background color change, always keep black
    // Reset button logic
    window.minuteCounterActive = false;
    window.minuteCounterStart = null;
    window.minuteCounterValue = 0;
    window.minuteCounterInterval = 60; // default 60 seconds
    const intervalInput = document.getElementById('intervalInput');
    intervalInput.onchange = function() {
      let val = parseInt(intervalInput.value, 10);
      if (isNaN(val) || val < 1) val = 1;
      if (val > 3600) val = 3600;
      intervalInput.value = val;
      window.minuteCounterInterval = val;
    };
    window.minuteCounterInterval = parseInt(intervalInput.value, 10);
    document.getElementById('resetBtn').onclick = function() {
      window.minuteCounterActive = true;
      window.minuteCounterStart = Date.now();
      window.minuteCounterValue = 0;
    };
  </script>
</body>
</html>
